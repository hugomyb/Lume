name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues first.
        For security vulnerabilities, **do not** use this form — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I ..., Lume ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Open ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Lume version
      description: From Settings → About (e.g. 0.5.1).
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install Lume?
      options:
        - AppImage
        - .deb
        - .rpm
        - AUR (lume-bin)
        - Built from source
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / distro / desktop
      description: e.g. Ubuntu 24.04, GNOME, Wayland.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant terminal output, console errors, or screenshots.
      render: shell
    validations:
      required: false
