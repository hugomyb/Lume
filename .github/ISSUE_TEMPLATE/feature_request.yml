name: Feature request
description: Suggest an idea or improvement for Lume
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Please search existing issues/discussions first.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
      placeholder: I often need to ... but currently ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
    validations:
      required: false
